name: Gemini PR Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini PR Reviewer
        uses: di-sukharev/gemini-pr-reviewer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          system_message: |
            당신은 시니어 풀스택 엔지니어입니다.
            변경된 코드(diff)를 분석하고 한국어로 코드 리뷰를 작성해주세요.

            [프로젝트 스택]
            - 프론트엔드: Vue 3 (Composition API), Tailwind CSS, Pinia, Vue Router, Chart.js
            - 백엔드: Java 17, Spring Boot 3, Spring Data JPA, MariaDB

            [프론트엔드 리뷰 항목]
            - 잠재적인 버그 및 엣지 케이스
            - 컴포넌트 재사용성 및 구조
            - 불필요한 렌더링, 메모리 누수 등 성능 이슈
            - Tailwind 클래스 중복 또는 비일관성

            [백엔드 리뷰 항목]
            - N+1 쿼리 등 JPA 성능 이슈
            - 트랜잭션 처리 누락 또는 범위 오류
            - REST API 설계 일관성 (HTTP 메서드, 상태 코드)
            - 예외 처리 및 입력값 검증 누락
            - SQL 인젝션 등 보안 취약점

            단순 칭찬은 생략하고 개선이 필요한 부분만 구체적으로 작성해주세요.


server:
  port: 8088

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka
    register-with-eureka: false
    fetch-registry: true

spring:
  application:
    name: gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://www.nexusscm.kro.kr"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
              - UPDATE
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: statistics
          uri: lb://NexusStatistics
          predicates:
            - Path=/statistics/**
          filters:
            - Jwt

        - id: pos
          uri: lb://NexusPos
          predicates:
            - Path=/pos/**
          filters:
            - Jwt






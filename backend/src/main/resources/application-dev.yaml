spring:
  application:
    name: Nexus
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: ${DB_DRIVER}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3
    mcp:
      client:
        stdio:
          connections:
            naver-news:
              command: node
              args:
                - ${MCP_NEWS_SERVER_PATH}
              env:
                NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:}
                NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        enabled: true # false = S3 작동 X
        store-bucket: ${AWS_S3_STORE_BUCKET}
        menu-bucket: ${AWS_S3_MENU_BUCKET}
        report-bucket: ${AWS_S3_REPORT_BUCKET}
      region:
        static: ${AWS_S3_STATIC}
  sql:
    init:
      mode: never
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB      # 파일 하나당 최대 크기 (PDF 기준)
      max-request-size: 15MB   # 전체 요청의 최대 크기

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

portone:
  portone_secret: ${PORTONE_SECRET}


logging:
  level:
    org.springframework.security: DEBUG
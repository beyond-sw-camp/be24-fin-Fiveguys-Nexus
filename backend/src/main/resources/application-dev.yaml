spring:
  application:
    name: Nexus
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: ${DB_DRIVER}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        store-bucket: ${AWS_S3_STORE_BUCKET}
        menu-bucket: ${AWS_S3_MENU_BUCKET}
      region:
        static: ${AWS_S3_STATIC}
  sql:
    init:
      mode: always
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

portone:
  portone_secret: ${PORTONE_SECRET}


# AI 챗봇의 시스템 프롬프트 메세지
report:
  ai:
    system-prompt: >
      당신은 프랜차이즈 본사의 데이터 분석 전문가입니다.
      전달받은 수치 데이터를 바탕으로 전문적인 마크다운 형식의 보고서를 작성합니다.
      친절하지만 간결한 비즈니스 톤을 유지하세요.

logging:
  level:
    org.springframework.security: DEBUG
spring:
  application:
    name: NexusStatistics
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: ${DB_DRIVER}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update             # 엔티티 복제 단계(B-1-3c)에서 테이블 자동 생성
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
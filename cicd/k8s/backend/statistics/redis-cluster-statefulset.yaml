## 통계 MSA Redis Cluster (Master 3 + Slave 3) — 운영 환경
## namespace: default
##
## 부하 테스트용은 k8s/load-test/test-redis-cluster-statefulset.yaml (namespace test)
##
## 클러스터 초기화 (수동, 1회만):
##   kubectl exec -n default redis-cluster-0 -- redis-cli --cluster create \
##     redis-cluster-0.redis-cluster-service:6379 \
##     redis-cluster-1.redis-cluster-service:6379 \
##     redis-cluster-2.redis-cluster-service:6379 \
##     redis-cluster-3.redis-cluster-service:6379 \
##     redis-cluster-4.redis-cluster-service:6379 \
##     redis-cluster-5.redis-cluster-service:6379 \
##     --cluster-replicas 1 --cluster-yes

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: default
spec:
  replicas: 6
  selector:
    matchLabels:
      type: redis-cluster
  # Headless Service 이름 (각 pod 의 stable DNS 보장)
  # 예: redis-cluster-0.redis-cluster-service:6379
  serviceName: redis-cluster-service
  template:
    metadata:
      labels:
        type: redis-cluster
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      # 가능하면 서로 다른 노드에 분산 (HA 효과 ↑)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    type: redis-cluster
                topologyKey: kubernetes.io/hostname
      containers:
        - name: redis
          image: redis:7-alpine
          # Cluster 모드 + AOF/RDB 끔 (#868 단일 노드 결정 동일, Kafka Event Sourcing 으로 보완)
          # cluster-node-timeout 5000ms = 노드 다운 감지 시간
          command:
            - redis-server
            - --cluster-enabled
            - "yes"
            - --cluster-config-file
            - /data/nodes.conf
            - --cluster-node-timeout
            - "5000"
            - --appendonly
            - "no"
            - --save
            - ""
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - "allkeys-lru"
          ports:
            - containerPort: 6379
              name: client
            - containerPort: 16379
              name: cluster-bus
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          volumeMounts:
            - name: volume
              mountPath: /data
          # Liveness — Redis 응답 확인
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
          # Readiness — 클라이언트가 안전히 접속 가능한 시점 판단
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli ping"
            initialDelaySeconds: 5
            periodSeconds: 5
      terminationGracePeriodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: longhorn

---

## Headless Service (clusterIP: None)
## - 각 pod 의 DNS: <pod-name>.redis-cluster-service.default.svc.cluster.local
## - 클러스터 초기화 시 6 pod 모두 명시 필요
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-service
  namespace: default
spec:
  clusterIP: None
  selector:
    type: redis-cluster
  ports:
    - port: 6379
      targetPort: 6379
      name: client
    - port: 16379
      targetPort: 16379
      name: cluster-bus

## Order Batch Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-order-batch
  namespace: test
  labels:
    app: test-order-batch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-order-batch
  template:
    metadata:
      labels:
        app: test-order-batch
      annotations:
        sidecar.istio.io/inject: "false"
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8090"
    spec:
      containers:
        - name: nexus-batch
          image: jaehyuklee071/nexusbatch:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx512m"
          envFrom:
            - configMapRef:
                name: test-order-batch-config
            - secretRef:
                name: test-backend-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: test-order-batch-service
  namespace: test
spec:
  type: NodePort
  selector:
    app: test-order-batch
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090

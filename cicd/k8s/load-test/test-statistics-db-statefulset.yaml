## 부하 테스트 전용 Statistics MariaDB (운영 DB와 별도 인스턴스)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-statistics-db-statefulset
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      type: test-statistics-db
  serviceName: test-statistics-db-service
  template:
    metadata:
      labels:
        type: test-statistics-db
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-statistics-secret
                  key: DB_PASS
            - name: MARIADB_ROOT_HOST
              value: '%'
            - name: MARIADB_DATABASE
              value: nexus
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: volume
              mountPath: /var/lib/mysql
      securityContext:
        fsGroup: 999
      terminationGracePeriodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1G
        storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: test-statistics-db-service
  namespace: test
spec:
  clusterIP: None         # Headless (statistics Pod이 DNS로 접근)
  selector:
    type: test-statistics-db
  ports:
    - port: 3306
      targetPort: 3306
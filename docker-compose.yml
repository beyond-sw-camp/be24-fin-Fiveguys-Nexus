# ============================================================
# Nexus 통합 docker-compose (Docker Hub 이미지 pull 방식)
# ============================================================
# 사용법 (one-command):
#   1. git clone <repo>
#   2. cp .env.example .env  →  값 채우기
#   3. docker compose up -d
#
# Docker Hub 에서 사전 빌드된 이미지를 pull 받아 실행 (별도 build 불필요)
# 이미지는 Jenkins CI 파이프라인이 git push 시 자동 build / push
#
#   정지:   docker compose down
#   정리:   docker compose down -v   (볼륨까지 제거)
# ============================================================

services:

  # ============================================================
  # Infra — DB ×3 (MariaDB 11)
  # ============================================================
  monolith-db:
    image: mariadb:11
    container_name: nexus-monolith-db
    environment:
      MARIADB_ROOT_PASSWORD: ${MONOLITH_DB_PASS}
      MARIADB_DATABASE: ${MONOLITH_DB_NAME}
      TZ: Asia/Seoul
    ports:
      - "${MONOLITH_DB_PORT}:3306"
    volumes:
      - monolith-db-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks: [nexus]

  stats-db:
    image: mariadb:11
    container_name: nexus-stats-db
    environment:
      MARIADB_ROOT_PASSWORD: ${STATS_DB_PASS}
      MARIADB_DATABASE: ${STATS_DB_NAME}
      TZ: Asia/Seoul
    ports:
      - "${STATS_DB_PORT}:3306"
    volumes:
      - stats-db-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks: [nexus]

  pos-db:
    image: mariadb:11
    container_name: nexus-pos-db
    environment:
      MARIADB_ROOT_PASSWORD: ${POS_DB_PASS}
      MARIADB_DATABASE: ${POS_DB_NAME}
      TZ: Asia/Seoul
    ports:
      - "${POS_DB_PORT}:3306"
    volumes:
      - pos-db-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Infra — Redis (통계 MSA 사전 집계)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Infra — Kafka (KRaft 모드 단일 노드)
  # ============================================================
  kafka:
    image: apache/kafka:3.9.0
    container_name: nexus-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9094,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9094,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Backend — Discovery (Eureka)
  # ============================================================
  discovery:
    image: ${DISCOVERY_IMAGE:-deatytim/nexusdiscovery:latest}
    container_name: nexus-discovery
    ports:
      - "${DISCOVERY_PORT}:9090"
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Backend — Gateway
  # ============================================================
  gateway:
    image: ${GATEWAY_IMAGE:-deatytim/nexusgateway:latest}
    container_name: nexus-gateway
    environment:
      EUREKA_SERVICE_URL: ${EUREKA_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${GATEWAY_PORT}:8088"
    depends_on: [discovery]
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Backend — Monolith (Docker Hub: deatytim/nexusback)
  # ============================================================
  monolith:
    image: ${MONOLITH_IMAGE:-deatytim/nexusback:latest}
    container_name: nexus-monolith
    environment:
      DB_URL: jdbc:mariadb://${MONOLITH_DB_HOST}:3306/${MONOLITH_DB_NAME}
      DB_USER: ${MONOLITH_DB_USER}
      DB_PASS: ${MONOLITH_DB_PASS}
      DB_DRIVER: org.mariadb.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      EUREKA_SERVICE_URL: ${EUREKA_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MCP_NEWS_SERVER_PATH: ${MCP_NEWS_SERVER_PATH}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_STORE_BUCKET: ${AWS_S3_STORE_BUCKET}
      AWS_S3_MENU_BUCKET: ${AWS_S3_MENU_BUCKET}
      AWS_S3_REPORT_BUCKET: ${AWS_S3_REPORT_BUCKET}
      AWS_S3_STATIC: ${AWS_S3_STATIC}
      MAIL_ADDR: ${MAIL_ADDR}
      MAIL_PASS: ${MAIL_PASS}
      SECRET_KEY: ${PORTONE_SECRET_KEY}
    ports:
      - "${MONOLITH_PORT}:8080"
    depends_on: [monolith-db, kafka, discovery]
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Backend — Statistics MSA
  # ============================================================
  statistics:
    image: ${STATISTICS_IMAGE:-deatytim/nexusstatistics:latest}
    container_name: nexus-statistics
    environment:
      DB_URL: jdbc:mariadb://${STATS_DB_HOST}:3306/${STATS_DB_NAME}
      DB_USER: ${STATS_DB_USER}
      DB_PASS: ${STATS_DB_PASS}
      DB_DRIVER: org.mariadb.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      EUREKA_SERVICE_URL: ${EUREKA_SERVICE_URL}
    ports:
      - "${STATS_PORT}:8081"
    depends_on: [stats-db, redis, kafka, discovery]
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Backend — Batch (발주 일괄 승인, Docker Hub: jaehyuklee071/nexusbatch)
  # ============================================================
  batch:
    image: ${BATCH_IMAGE:-jaehyuklee071/nexusbatch:latest}
    container_name: nexus-batch
    environment:
      DB_URL: jdbc:mariadb://${MONOLITH_DB_HOST}:3306/${MONOLITH_DB_NAME}
      DB_USER: ${MONOLITH_DB_USER}
      DB_PASS: ${MONOLITH_DB_PASS}
      DB_DRIVER: org.mariadb.jdbc.Driver
    ports:
      - "${BATCH_PORT}:8083"
    depends_on: [monolith-db]
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Backend — POS MSA
  # ============================================================
  pos:
    image: ${POS_IMAGE:-deatytim/nexuspos:latest}
    container_name: nexus-pos
    environment:
      DB_URL: jdbc:mariadb://${POS_DB_HOST}:3306/${POS_DB_NAME}
      DB_USER: ${POS_DB_USER}
      DB_PASS: ${POS_DB_PASS}
      DB_DRIVER: org.mariadb.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      EUREKA_SERVICE_URL: ${EUREKA_SERVICE_URL}
    ports:
      - "${POS_PORT}:8082"
    depends_on: [pos-db, kafka, discovery]
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Backend — Billing Batch (정산)
  # ============================================================
  billing-batch:
    image: ${BILLING_BATCH_IMAGE:-deatytim/nexusbilling:latest}
    container_name: nexus-billing-batch
    environment:
      # billing-batch 는 dual datasource (META=Spring Batch 메타테이블 / DATA=비즈니스 데이터)
      # 모두 모놀리식 DB 와 동일한 인스턴스를 사용
      DB_URL_META: jdbc:mariadb://${MONOLITH_DB_HOST}:3306/${MONOLITH_DB_NAME}
      DB_USER_META: ${MONOLITH_DB_USER}
      DB_PASS_META: ${MONOLITH_DB_PASS}
      DB_DRIVER_META: org.mariadb.jdbc.Driver
      DB_URL_DATA: jdbc:mariadb://${MONOLITH_DB_HOST}:3306/${MONOLITH_DB_NAME}
      DB_USER_DATA: ${MONOLITH_DB_USER}
      DB_PASS_DATA: ${MONOLITH_DB_PASS}
      DB_DRIVER_DATA: org.mariadb.jdbc.Driver
      SECRET_KEY: ${PORTONE_SECRET_KEY}
    depends_on: [monolith-db]
    restart: unless-stopped
    networks: [nexus]


  # ============================================================
  # Frontend — Nginx (Docker Hub: deatytim/nexusfront)
  # ============================================================
  frontend:
    image: ${FRONTEND_IMAGE:-deatytim/nexusfront:latest}
    container_name: nexus-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on: [gateway]
    restart: unless-stopped
    networks: [nexus]


# ============================================================
# Volumes — 컨테이너 재시작 후에도 데이터 보존
# ============================================================
volumes:
  monolith-db-data:
  stats-db-data:
  pos-db-data:
  redis-data:
  kafka-data:


# ============================================================
# Network — 모든 서비스 동일 네트워크
# ============================================================
networks:
  nexus:
    driver: bridge

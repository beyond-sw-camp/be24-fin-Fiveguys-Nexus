apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-frontend-green
  labels:
    app: nexus-frontend
    slot: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-frontend
      slot: green
  template:
    metadata:
      labels:
        app: nexus-frontend
        slot: green
    spec:
      containers:
        - name: nexus-frontend
          image: deatytim/nexusfront:latest
          ports:
            - containerPort: 80

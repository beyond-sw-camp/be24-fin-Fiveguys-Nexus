## 부하 테스트 전용 Backend Deployment
## 운영 pod와 완전히 분리 (별도 이름, 별도 DB)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-backend
  labels:
    app: test-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-backend
  template:
    metadata:
      labels:
        app: test-backend
      annotations:
        sidecar.istio.io/inject: "false"   # 테스트용이라 Istio sidecar 불필요
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: nexus-backend
          image: deatytim/nexusback:latest
          ports:
            - containerPort: 8080
          env:
            ## JVM 메모리 설정
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms512m -Xmx1024m"
          envFrom:
            - configMapRef:
                name: test-backend-config
            - secretRef:
                name: nexus-backend-secret   # Secret은 운영과 공유 (API 키 등)
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m          # 1 core
              memory: 1536Mi      # Xmx 1024m + JVM 오버헤드 ~256m + 여유
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
---
## 테스트 Backend에 접근하기 위한 Service
## NodePort로 외부에서 직접 k6 부하를 쏠 수 있게 함
apiVersion: v1
kind: Service
metadata:
  name: test-backend-service
spec:
  type: NodePort
  selector:
    app: test-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30088        # 외부에서 <노드IP>:30088 으로 접근
